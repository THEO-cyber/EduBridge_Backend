version: '3.9'

# ── How to run ────────────────────────────────────────────────────────────────
#
#  1. Copy .env.example → .env and fill in secrets
#  2. Set HOST_IP in .env to your machine's LAN IP (e.g. 192.168.1.152)
#     Flutter connects to this IP for both the API and presigned uploads.
#  3. docker compose up -d --build
#
# Ports exposed to the host:
#   80    → NGINX  (API + CDN video streaming — Flutter connects here)
#   9000  → MinIO  (presigned PUT uploads from Flutter — direct to storage)
#   9001  → MinIO console  (http://localhost:9001)
#   6379  → Redis  (only needed when running NestJS locally with npm start)
#   5432  → Postgres (only needed for Prisma Studio / local migrations)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── NGINX ─ entry point + CDN cache ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: edubridge-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx/media
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── API ─ NestJS HTTP server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: edubridge-api:latest
    container_name: edubridge-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      DIRECT_URL:          postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      S3_ENDPOINT:         http://minio:9000
      MINIO_PUBLIC_URL:    http://${HOST_IP:-192.168.1.152}:9000
      MEDIA_CDN_URL:       http://${HOST_IP:-192.168.1.152}
      AWS_S3_BUCKET:       ${AWS_S3_BUCKET:-edubridge-videos}
      AWS_ACCESS_KEY_ID:   ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION:          us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - uploads:/app/uploads
    networks:
      - internal

  # ── Worker ─ BullMQ video transcoding (scale with --scale worker=N) ──────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: edubridge-api:latest
    # no container_name here — allows: docker compose up -d --scale worker=4
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      DIRECT_URL:          postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      S3_ENDPOINT:         http://minio:9000
      AWS_S3_BUCKET:       ${AWS_S3_BUCKET:-edubridge-videos}
      AWS_ACCESS_KEY_ID:   ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION:          us-east-1
      WORKER_MODE:         'true'  # skips HTTP server, runs only BullMQ processor
    command: ['node', 'dist/main']
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - uploads:/app/uploads
    networks:
      - internal

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edubridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu}
      POSTGRES_DB:       ${POSTGRES_DB:-edubridge}
    ports:
      - '5432:5432'   # Prisma Studio / local migrations
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-edu}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edubridge-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'   # Local npm start
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── MinIO ─ S3-compatible object storage ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: edubridge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - '9000:9000'   # Flutter presigned PUT uploads (direct to storage)
      - '9001:9001'   # Admin console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO bucket init (runs once on first start) ──────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: edubridge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_BUCKET:        ${AWS_S3_BUCKET:-edubridge-videos}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set download local/$${MINIO_BUCKET};
        echo 'MinIO bucket ready: '$${MINIO_BUCKET};
      "
    networks:
      - internal

  # ── Prisma Studio (dev only — start with: docker compose --profile dev up) ────
  studio:
    image: node:20-alpine
    container_name: edubridge-studio
    profiles: ['dev']
    working_dir: /app
    command: npx prisma studio
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
    ports:
      - '5555:5555'
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  miniodata:
  uploads:
  nginx_cache:

networks:
  internal:
    driver: bridge
