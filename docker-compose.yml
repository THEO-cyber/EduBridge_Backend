version: '3.9'

# ── How to run ────────────────────────────────────────────────────────────────
#
#  1. Copy .env.example → .env and fill in secrets
#  2. docker compose up -d --build
#
# Ports exposed to the host:
#   80    → NGINX  (API — Flutter connects here)
#   6379  → Redis  (only needed when running NestJS locally with npm start)
#
# Video storage: Cloudflare R2 (set S3_ENDPOINT, AWS_* vars in .env)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── NGINX ─ entry point ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: edubridge-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx/media
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── API ─ NestJS HTTP server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: edubridge-api:latest
    container_name: edubridge-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:   production
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      DIRECT_URL:   postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    networks:
      - internal

  # ── Worker ─ BullMQ video transcoding (scale with --scale worker=N) ──────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: edubridge-api:latest
    # no container_name — allows: docker compose up -d --scale worker=4
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      DIRECT_URL:   postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
      REDIS_HOST:   redis
      REDIS_PORT:   '6379'
      WORKER_MODE:  'true'
    command: ['node', 'dist/main']
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    networks:
      - internal

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edubridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu}
      POSTGRES_DB:       ${POSTGRES_DB:-edubridge}
    # Port NOT exposed — API reaches Postgres over the internal Docker network.
    # For Prisma Studio: docker compose --profile dev up studio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-edu}']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edubridge-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'   # Local npm start only
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - internal

  # ── Prisma Studio (dev only) ──────────────────────────────────────────────────
  studio:
    image: node:20-alpine
    container_name: edubridge-studio
    profiles: ['dev']
    working_dir: /app
    command: npx prisma studio
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edubridge}
    ports:
      - '5555:5555'
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  uploads:
  nginx_cache:

networks:
  internal:
    driver: bridge
