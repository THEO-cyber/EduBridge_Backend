worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # Gzip API responses (not videos — they're already compressed)
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/rss+xml text/javascript;

    # ── CDN cache zone ────────────────────────────────────────────────────────
    # Stores up to 20 GB of processed video on disk; unused files evicted after 7 days.
    # First request fetches from MinIO and populates cache.
    # Every subsequent request is served from disk — NestJS never touched.
    proxy_cache_path /var/cache/nginx/media
        levels=1:2
        keys_zone=media_cache:64m
        max_size=20g
        inactive=7d
        use_temp_path=off;

    # Upstream pools
    upstream api           { server api:3000;   keepalive 64; }
    upstream minio         { server minio:9000; keepalive 32; }
    upstream minio_console { server minio:9001; keepalive 8;  }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

        # Allow large bodies (old multipart upload fallback)
        client_max_body_size    2048M;
        client_body_timeout     300s;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        proxy_connect_timeout   10s;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options          SAMEORIGIN      always;
        add_header X-Content-Type-Options   nosniff         always;
        add_header Referrer-Policy          no-referrer     always;

        # ── Block raw video access (unprocessed, unmoderated) ─────────────────
        location ~ ^/media/videos/raw/ {
            return 403;
        }

        # ── Processed video CDN delivery ──────────────────────────────────────
        # Maps /media/videos/processed/{videoId}/{quality}.mp4
        #   →  MinIO  edubridge-videos/videos/processed/{videoId}/{quality}.mp4
        #
        # Cache behaviour:
        #   MISS  → NGINX fetches from MinIO, stores on disk, returns to client
        #   HIT   → served entirely from NGINX disk cache (MinIO not contacted)
        #   STALE → serve stale while refreshing in background (no stuttering)
        location ~ ^/media/videos/processed/(.+)$ {
            proxy_pass         http://minio/edubridge-videos/videos/processed/$1;
            proxy_http_version 1.1;
            proxy_set_header   Host minio:9000;
            proxy_set_header   Connection "";

            # CDN cache
            proxy_cache                     media_cache;
            proxy_cache_key                 "$uri";
            proxy_cache_valid               200 206 7d;
            proxy_cache_use_stale           error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update   on;
            proxy_cache_lock                on;
            proxy_cache_lock_timeout        5s;

            # Pass byte-range requests through so video seeking works from cache
            proxy_set_header  Range     $http_range;
            proxy_set_header  If-Range  $http_if_range;
            proxy_force_ranges on;

            # Client-facing headers
            add_header X-Cache-Status        $upstream_cache_status  always;
            add_header Accept-Ranges         bytes                   always;
            add_header Cache-Control         "public, max-age=604800, immutable" always;
            add_header Access-Control-Allow-Origin  *               always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range"         always;

            if ($request_method = OPTIONS) { return 204; }
        }

        # ── Thumbnail CDN delivery ────────────────────────────────────────────
        location ~ ^/media/thumbnails/(.+)$ {
            proxy_pass         http://minio/edubridge-videos/thumbnails/$1;
            proxy_http_version 1.1;
            proxy_set_header   Host minio:9000;
            proxy_set_header   Connection "";

            proxy_cache             media_cache;
            proxy_cache_key         "$uri";
            proxy_cache_valid       200 30d;
            proxy_cache_use_stale   error timeout;

            add_header X-Cache-Status  $upstream_cache_status   always;
            add_header Cache-Control   "public, max-age=2592000" always;
            add_header Access-Control-Allow-Origin * always;
        }

        # ── Certificate delivery ──────────────────────────────────────────────
        location ~ ^/media/certificates/(.+)$ {
            proxy_pass         http://minio/edubridge-videos/certificates/$1;
            proxy_http_version 1.1;
            proxy_set_header   Host minio:9000;
            proxy_set_header   Connection "";

            proxy_cache         media_cache;
            proxy_cache_key     "$uri";
            proxy_cache_valid   200 1d;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header Content-Disposition "inline" always;
        }

        # ── API (upload rate limited separately) ──────────────────────────────
        location ~ ^/api/v1/video-processing/upload/ {
            limit_req  zone=upload_limit burst=5 nodelay;

            proxy_pass             http://api;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_request_buffering off;   # Stream body directly — no NestJS RAM buffering
            proxy_buffering         off;
            proxy_read_timeout      600s;  # 10 min for large uploads
        }

        # ── API (all other routes) ────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api_limit burst=20 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
        }

        # ── MinIO admin console ───────────────────────────────────────────────
        location /minio-console/ {
            proxy_pass         http://minio_console/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }
}
